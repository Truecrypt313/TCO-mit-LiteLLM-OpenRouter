services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    ports:
      - "4000:4000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OR_SITE_URL: ${OR_SITE_URL:-http://localhost}
      OR_APP_NAME: ${OR_APP_NAME:-toc-mvp}
      DATABASE_URL: postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm}@postgres:5432/${POSTGRES_DB:-litellm}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-abc123123}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-abc123}
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: litellm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
    ports:
      - "5432:5432"
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: UTC
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-abc123123}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n/workflows:/workflows
    depends_on:
      - litellm

volumes:
  litellm_postgres_data:
  n8n_data:
